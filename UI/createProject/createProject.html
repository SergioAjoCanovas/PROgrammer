<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProGrammer - Crear Proyecto</title>

    <link rel="stylesheet" href="../../Style/general_styles/header.css">
    <link rel="stylesheet" href="../../Style/general_styles/footer.css">
    <link rel="stylesheet" href="../../Style/general_styles/general_styles.css">
    <link rel="stylesheet" href="../../Style/createProject_styles/createProject_styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="fondo-oscuro-neon">

    <div class="bolas-fondo">
        <div class="bola"></div>
        <div class="bola"></div>
        <div class="bola"></div>
    </div>

    <div id="header-placeholder"></div>

    <main class="contenedor-principal-edicion">
        <section class="tarjeta-edicion">
            <div class="cabecera-edicion">
                <h2><i class="fas fa-plus-circle"></i> Nuevo Proyecto</h2>
                <button class="boton-volver" onclick="window.history.back()" title="Cancelar">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <form id="form-crear">
                <div class="campo">
                    <label>Imagen de portada</label>
                    <div class="portada-contenedor">
                        <img src="https://via.placeholder.com/800x400/1a1a1a/FFCC00?text=Haz+clic+para+subir+portada" id="preview-img" alt="Vista previa">
                        <div class="overlay-subir-portada">
                            <label for="file-upload"><i class="fas fa-cloud-upload-alt"></i></label>
                            <input type="file" id="file-upload" accept="image/*" hidden>
                        </div>
                    </div>
                </div>

                <div class="campo">
                    <label>Título del Proyecto</label>
                    <input type="text" placeholder="Ej. Sistema de Gestión de Inventarios" required>
                </div>

                <div class="campo">
                    <label>Descripción del Proyecto</label>
                    <textarea placeholder="Describe brevemente de qué trata tu proyecto..." rows="5" required></textarea>
                </div>

                <div class="campo">
                    <label>Tecnologías Utilizadas</label>
                    <div class="contenedor-checkboxes">
                        <label class="item-check">
                            <input type="checkbox" name="tech" value="html">
                            <span class="custom-check"></span> HTML5
                        </label>
                        <label class="item-check">
                            <input type="checkbox" name="tech" value="css">
                            <span class="custom-check"></span> CSS3
                        </label>
                        <label class="item-check">
                            <input type="checkbox" name="tech" value="js">
                            <span class="custom-check"></span> JavaScript
                        </label>
                        <label class="item-check">
                            <input type="checkbox" name="tech" value="react">
                            <span class="custom-check"></span> React
                        </label>
                        <label class="item-check">
                            <input type="checkbox" name="tech" value="node">
                            <span class="custom-check"></span> Node.js
                        </label>
                        <label class="item-check">
                            <input type="checkbox" name="tech" value="python">
                            <span class="custom-check"></span> Python
                        </label>
                        <label class="item-check">
                            <input type="checkbox" name="tech" value="java">
                            <span class="custom-check"></span> Java
                        </label>
                        <label class="item-check">
                            <input type="checkbox" name="tech" value="sql">
                            <span class="custom-check"></span> SQL
                        </label>
                    </div>
                </div>

                <div class="fila-doble">
                    <div class="campo">
                        <label><i class="fab fa-github"></i> Enlace al Repositorio</label>
                        <input type="url" placeholder="https://github.com/tu-usuario/repo">
                    </div>
                    <div class="campo">
                        <label><i class="fas fa-globe"></i> Enlace a la Demo</label>
                        <input type="url" placeholder="https://tu-proyecto.vercel.app">
                    </div>
                </div>

                <div class="contenedor-botones">
                    <button type="submit" class="btn-guardar">
                        <i class="fas fa-rocket"></i> Publicar Proyecto
                    </button>
                </div>
            </form>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        // Carga Header y Footer
        const headerPath = "../../includes/header.html";
        const footerPath = "../../includes/footer.html";

        fetch(headerPath).then(res => res.text()).then(html => document.getElementById("header-placeholder").innerHTML = html);
        fetch(footerPath).then(res => res.text()).then(html => document.getElementById("footer-placeholder").innerHTML = html);

        // Preview de imagen
        const fileInput = document.getElementById('file-upload');
        const previewImg = document.getElementById('preview-img');

        fileInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImg.setAttribute('src', e.target.result);
                }
                reader.readAsDataURL(file);
            }
        });
    </script>

</body>
</html>
