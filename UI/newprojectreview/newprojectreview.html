<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProGrammer - Reseña de Proyecto</title>

    <link rel="stylesheet" href="../../Style/general_styles/header.css">
    <link rel="stylesheet" href="../../Style/general_styles/footer.css">
    <link rel="stylesheet" href="../../Style/newprojectreview/newprojectreview.css">
    <link rel="stylesheet" href="../../Style/general_styles/general_styles.css">  
    <link rel="stylesheet" href="../../Style/profileView_styles/profileView.css">
    <link rel="stylesheet" href="../../Style/projectview_styles/projectview.css">
    <link rel="stylesheet" href="../../Style/projectview_styles/images.css">
    <link rel="stylesheet" href="../../Style/projectview_styles/images-modals.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="fondo-oscuro-neon">

<div id="header-placeholder"></div>

<main class="contenedor-principal">

    <!-- IZQUIERDA -->
    <aside class="columna-perfil">
        <div class="tarjeta-perfil">
            <div class="perfil-superior">
                <div class="foto-perfil-contenedor">
                    <div class="circulo-foto"></div>
                    <div class="icono-corazon"><i class="fas fa-heart"></i></div>
                </div>
                <h2 class="nombre-usuario">Nombre del usuario del proyecto</h2>
            </div>

            <div class="perfil-inferior">
                <ul class="redes-sociales">
                    <li>- Insta</li>
                    <li>- Twiter</li>
                    <li>- Tel</li>
                </ul>
                <button class="boton-curriculum">CURRICULUM</button>
            </div>
        </div>
    </aside>

    <!-- CENTRO -->
    <!-- Vista de proyecto -->

    <section class="seccion-derecha-dinamica">

        <div class="tarjeta-proyecto-detalle">
    
            <!-- TÍTULO -->
            <div class="cabecera-proyecto">
                <h2>Nombre del Proyecto</h2>
                <a href="../projectlist/projectlist.html" class="boton-volver-curvo" title="Volver a la lista de proyectos">
                    <i class="fas fa-undo"></i>
                </a>
            </div>
            <!-- AUTOR + VALIDACIÓN + DESCARGA -->
            <div class="info-superior">
                <p><strong>Autor:</strong> David Alcázar</p>
    
                <div class="estado-proyecto">
                    <span class="badge validado">
                        <i class="fas fa-check-circle"></i> Validado
                    </span>
                
                    <button class="boton-descargar">
                        <i class="fas fa-download"></i> Descargar
                    </button>
                </div>
            </div>
    
            <!-- CAROUSEL -->
            <div class="galeria-proyecto">

                <img src="../../Img/stock/ejemplo1.jpg" class="img-proyecto">
                <img src="../../Img/stock/ejemplo2.jpg" class="img-proyecto">
                <img src="../../Img/stock/ejemplo3.jpg" class="img-proyecto">
                <img src="../../Img/stock/ejemplo4.jpg" class="img-proyecto">
            
            </div>
            
            <!-- MODAL -->
            <div class="modal-img" id="modal">
                <span class="cerrar">&times;</span>
                <img class="modal-contenido" id="img-grande">
            </div>
    
            <!-- DESCRIPCIÓN -->
            <div class="descripcion-proyecto">
                <h3>Descripción</h3>
                <p>
                    Este proyecto consiste en una plataforma para conectar desarrolladores...
                </p>
            </div>
    
            <!-- REPO -->
            <div class="repo">
                <h3>Repositorio</h3>
                <a href="#" target="_blank">https://github.com/proyecto</a>
            </div>
    
        </div>
    
    </section>

    <!-- DERECHA -->
    <section class="zona-derecha">

        <div class="tarjeta-formulario">

            <h2><i class="fas fa-star"></i> Valorar proyecto</h2>

            <!-- ARQUITECTURA -->
            <div class="campo">
                <label><i class="fas fa-sitemap"></i> Arquitectura</label>
                <div class="estrellas" data-tipo="arquitectura"></div>
            </div>

            <!-- LIMPIEZA -->
            <div class="campo">
                <label><i class="fas fa-broom"></i> Limpieza de código</label>
                <div class="estrellas" data-tipo="limpieza"></div>
            </div>

            <!-- DOCUMENTACIÓN -->
            <div class="campo">
                <label><i class="fas fa-book"></i> Documentación</label>
                <div class="estrellas" data-tipo="documentacion"></div>
            </div>

            <!-- COMENTARIO -->
            <div class="campo">
                <label>Comentario</label>
                <textarea id="comentario" placeholder="Escribe tu reseña..."></textarea>
            </div>

            <button class="boton-ver" id="btn-publicar">
                <i class="fas fa-paper-plane"></i> Publicar reseña
            </button>

        </div>

    </section>

</main>

<div id="footer-placeholder"></div>
<script>
    const ratings = {
        arquitectura: 0,
        limpieza: 0,
        documentacion: 0
    };

    document.querySelectorAll(".estrellas").forEach(container => {

        // generar estrellas dinámicamente
        for (let i = 1; i <= 5; i++) {
            const estrella = document.createElement("i");
            estrella.classList.add("far", "fa-star");
            estrella.dataset.value = i;
            container.appendChild(estrella);
        }

        const estrellas = container.querySelectorAll("i");
        const tipo = container.dataset.tipo;

        estrellas.forEach((estrella, index) => {
            estrella.addEventListener("click", () => {

                ratings[tipo] = index + 1;

                estrellas.forEach((e, i) => {
                    e.classList.toggle("fas", i <= index);
                    e.classList.toggle("far", i > index);
                    e.classList.toggle("activa", i <= index);
                });

            });
        });
    });

    document.getElementById("btn-publicar").addEventListener("click", () => {

        const comentario = document.getElementById("comentario").value;

        if (!ratings.arquitectura || !ratings.limpieza || !ratings.documentacion) {
            alert("Completa todas las valoraciones");
            return;
        }

        console.log("Review enviada:", ratings, comentario);

        // limpiar
        document.getElementById("comentario").value = "";

        document.querySelectorAll(".estrellas i").forEach(e => {
            e.classList.remove("fas", "activa");
            e.classList.add("far");
        });

        ratings.arquitectura = 0;
        ratings.limpieza = 0;
        ratings.documentacion = 0;
    });

    // HEADER FOOTER
    fetch("../../includes/header.html")
        .then(res => res.text())
        .then(html => document.getElementById("header-placeholder").innerHTML = html);

    fetch("../../includes/footer.html")
        .then(res => res.text())
        .then(html => document.getElementById("footer-placeholder").innerHTML = html);
</script> 

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- jQuery UI -->
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>

    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">

    <script>
        const modal = document.getElementById("modal");
        const modalImg = document.getElementById("img-grande");
    
        document.querySelectorAll(".img-proyecto").forEach(img => {
            img.onclick = function() {
                modal.style.display = "block";
                modalImg.src = this.src;
            }
        });
    
        document.querySelector(".cerrar").onclick = function() {
            modal.style.display = "none";
        }
    
        modal.onclick = function(e) {
            if(e.target === modal) {
                modal.style.display = "none";
            }
        }

        
    </script>
</body>
</html>
