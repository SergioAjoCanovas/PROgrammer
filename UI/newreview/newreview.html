<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProGrammer - Reseñas</title>

    <link rel="stylesheet" href="../../Style/general_styles/header.css">
    <link rel="stylesheet" href="../../Style/general_styles/footer.css">
    <link rel="stylesheet" href="../../Style/newreview_styles/newreview.css">
    <link rel="stylesheet" href="../../Style/general_styles/general_styles.css">  
    <link rel="stylesheet" href="../../Style/profileView_styles/profileView.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
</head>
<body class="fondo-oscuro-neon">

<div id="header-placeholder"></div>

<main class="contenedor-principal">

    <!-- IZQUIERDA (PERFIL) -->
    <aside class="columna-perfil">
        <div class="tarjeta-perfil">
            <div class="perfil-superior">
                <div class="foto-perfil-contenedor">
                    <div class="circulo-foto"></div>
                    <div class="icono-corazon"><i class="fas fa-heart"></i></div>
                </div>
                <h2 class="nombre-usuario">Nombre del usuario del proyecto</h2>
            </div>

            <div class="perfil-inferior">
                <ul class="redes-sociales">
                    <li><i class="fab fa-instagram"></i> Insta</li>
                    <li><i class="fab fa-twitter"></i> Twiter</li>
                    <li><i class="fas fa-phone"></i> Tel</li>
                </ul>
                <button class="boton-curriculum">CURRICULUM</button>
            </div>
        </div>
    </aside>

    <!-- CENTRO + DERECHA -->
    <section class="zona-reseñas">

        <!-- CREAR RESEÑA -->
        <div class="tarjeta-acordeon tarjeta-crear-reseña">

            <h2><i class="fas fa-pen"></i> Añadir reseña </h2>
            <a href="../profileView.html" class="boton-volver-circular" title="Volver">
                <i class="fas fa-undo"></i>
            </a>
            <div class="campo">
                <label>Valoración</label>
                <div class="estrellas" id="estrellas">
                    <i class="far fa-star" data-value="1"></i>
                    <i class="far fa-star" data-value="2"></i>
                    <i class="far fa-star" data-value="3"></i>
                    <i class="far fa-star" data-value="4"></i>
                    <i class="far fa-star" data-value="5"></i>
                </div>
            </div>

            <div class="campo">
                <label>Comentario</label>
                <textarea id="comentario" placeholder="Escribe tu reseña..."></textarea>
            </div>

            <button class="boton-ver" id="btn-publicar">
                <i class="fas fa-paper-plane"></i> Publicar reseña
            </button>

        </div>

        <!-- LISTA DE RESEÑAS -->
        <div class="tarjeta-acordeon tarjeta-lista-reseñas">

            <h2><i class="fas fa-comments"></i> Reseñas</h2>
            
            <div class="contenedor-reseñas" id="lista-reseñas">

                <div class="reseña">
                    <div class="reseña-header">
                        <span class="usuario">Carlos</span>
                        <span class="rating">⭐⭐⭐⭐⭐</span>
                    </div>
                    <p>Muy buen desarrollador, trabajé con él en varios proyectos.</p>
                </div>

                <div class="reseña">
                    <div class="reseña-header">
                        <span class="usuario">Laura</span>
                        <span class="rating">⭐⭐⭐⭐</span>
                    </div>
                    <p>Buen código y buena comunicación.</p>
                </div>

                <div class="reseña">
                    <div class="reseña-header">
                        <span class="usuario">Miguel</span>
                        <span class="rating">⭐⭐⭐⭐⭐</span>
                    </div>
                    <p>Recomendadísimo para proyectos frontend.</p>
                </div>

            </div>

        </div>

    </section>

</main>

<div id="footer-placeholder"></div>

<script>
    // =========================
    // ⭐ ESTRELLAS
    // =========================
    let ratingSeleccionado = 0;
    const estrellas = document.querySelectorAll("#estrellas i");

    estrellas.forEach(estrella => {
        estrella.addEventListener("click", () => {
            ratingSeleccionado = estrella.getAttribute("data-value");

            estrellas.forEach(e => {
                e.classList.remove("fas", "activa");
                e.classList.add("far");
            });

            for (let i = 0; i < ratingSeleccionado; i++) {
                estrellas[i].classList.remove("far");
                estrellas[i].classList.add("fas", "activa");
            }
        });
    });

    // =========================
    // ⭐ GENERAR TEXTO ESTRELLAS
    // =========================
    function generarEstrellasHTML(valor) {
        let estrellas = "";
        for (let i = 0; i < valor; i++) {
            estrellas += "⭐";
        }
        return estrellas;
    }

    // =========================
    // 🚀 BOTÓN PUBLICAR
    // =========================
    document.getElementById("btn-publicar").addEventListener("click", () => {

        const comentario = document.getElementById("comentario").value.trim();
        const lista = document.getElementById("lista-reseñas");

        if (comentario === "" || ratingSeleccionado === 0) {
            alert("Añade comentario y valoración");
            return;
        }

        const nuevaReseña = document.createElement("div");
        nuevaReseña.classList.add("reseña");

        nuevaReseña.innerHTML = `
            <div class="reseña-header">
                <span class="usuario">Tú</span>
                <span class="rating">${generarEstrellasHTML(ratingSeleccionado)}</span>
            </div>
            <p>${comentario}</p>
        `;

        // 👉 AQUÍ ES DONDE SE AÑADE
        lista.prepend(nuevaReseña);

        // limpiar
        document.getElementById("comentario").value = "";
        ratingSeleccionado = 0;

        estrellas.forEach(e => {
            e.classList.remove("fas", "activa");
            e.classList.add("far");
        });
    });

    // =========================
    // HEADER / FOOTER
    // =========================
    const headerPath = "../../includes/header.html";
    const footerPath = "../../includes/footer.html";

    fetch(headerPath)
        .then(res => res.text())
        .then(html => document.getElementById("header-placeholder").innerHTML = html);

    fetch(footerPath)
        .then(res => res.text())
        .then(html => document.getElementById("footer-placeholder").innerHTML = html);

</script>

</body>
</html>
