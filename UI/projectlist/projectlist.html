<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProGrammer - Proyectos</title>
    <link rel="stylesheet" href="../../Style/general_styles/header.css">
    <link rel="stylesheet" href="../../Style/general_styles/footer.css">
    <link rel="stylesheet" href="../../Style/projectlist_styles/profile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Cabecera -->

    <header class="encabezado-principal">
        <div class="seccion-izquierda">
            <div class="contenedor-logotipo">
                <img src="../../Img/fondogris2.png" alt="Logotipo ProGrammer" class="imagen-logotipo">            
            </div>
            <div class="contenedor-buscador">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Buscar...">
            </div>
        </div>

        <nav class="navegacion-central">
            <a href="#"><i class="fas fa-home"></i></a>
            <a href="#"><i class="fas fa-users"></i></a>
            <a href="#"><i class="fas fa-briefcase"></i></a>
            <a href="#"><i class="fas fa-comment"></i></a>
            <a href="#"><i class="fas fa-bell"></i></a>
            <a href="#"><i class="fas fa-th"></i></a>
        </nav>

        <div class="seccion-derecha">
            <div class="avatar-usuario">
                <i class="fas fa-user"></i>
            </div>
            <button class="boton-ajustes">
                <i class="fas fa-cog"></i>
            </button>
        </div>
    </header>



    <!-- Perfil -->

    <main class="contenedor-principal">
        <aside class="columna-perfil">
            <div class="tarjeta-perfil">
                <div class="perfil-superior">
                    <div class="foto-perfil-contenedor">
                        <div class="circulo-foto"></div>
                        <div class="icono-corazon"><i class="fas fa-heart"></i></div>
                    </div>
                    <h2 class="nombre-usuario">Nombre del usuario del proyecto</h2>
                </div>

                <div class="perfil-inferior">
                    <ul class="redes-sociales">
                        <li>- Insta</li>
                        <li>- Twiter</li>
                        <li>- Tel</li>
                    </ul>
                    <button class="boton-curriculum">CURRICULUM</button>
                </div>
            </div>

            
            <!-- Reseñas -->

            <div class="tarjeta-resenas-izq">
                <h3>RESEÑAS</h3>
                <p>Escribe aquí....</p>
                <button class="boton-anadir">Añadir reseña</button>
            </div>
        </aside>



        <!-- Proyectos -->

    </main>

    <!-- Footer -->

    <footer class="footer-principal">
        <div class="footer-contenido">
            
            <!-- IZQUIERDA -->
            <div class="footer-seccion">
                <img src="../../Img/logo_sin_silla_de_ruedas-removebg-preview.png" alt="Logotipo" class="footer-logo">
                <div class="footer-texto">
                <p>2026 ProGrammer</p>
                <p>Sergio Ajo, Cristian Escobar, David Alcázar</p>
                </div>
            </div>
    
            <!-- CENTRO -->
            <div class="footer-seccion footer-links">
                <a href="#">Sobre nosotros</a>
                <a href="#">Privacidad</a>
                <a href="#">Términos</a>
                <a href="#">Contacto</a>
            </div>
    
            <!-- DERECHA -->
            <div class="footer-seccion footer-redes">
                <a href="#"><i class="fab fa-github"></i></a>
                <a href="#"><i class="fab fa-linkedin"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
            </div>
    
        </div>
    </footer>
</body>
</html>
