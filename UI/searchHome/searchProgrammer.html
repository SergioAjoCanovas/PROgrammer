<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProGrammer - Buscar Perfiles</title>
    <link rel="stylesheet" href="../../Style/general_styles/header.css">
    <link rel="stylesheet" href="../../Style/general_styles/footer.css">
    <link rel="stylesheet" href="../../Style/general_styles/general_styles.css">
    <link rel="stylesheet" href="../../Style/homePage_styles/searchProgrammer.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="encabezado-principal">
        <div class="seccion-izquierda">
            <div class="contenedor-logotipo">
                <img src="../../Img/fondogris2.png" alt="Logotipo ProGrammer" class="imagen-logotipo">            
            </div>
            <div class="contenedor-buscador">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Buscar...">
            </div>
        </div>
        <nav class="navegacion-central">
            <a href="main.html"><i class="fas fa-home"></i></a>
            <a href="#"><i class="fas fa-users"></i></a>
            <a href="#"><i class="fas fa-briefcase"></i></a>
            <a href="#"><i class="fas fa-comment"></i></a>
            <a href="#"><i class="fas fa-bell"></i></a>
            <a href="#"><i class="fas fa-th"></i></a>
        </nav>
        <div class="seccion-derecha">
            <div class="avatar-usuario">
                <a href="loginPage/loginPage.html" class="avatar-usuario">
                    <i class="fas fa-user"></i>
                </a>
            </div>
            <button class="boton-ajustes">
                <i class="fas fa-cog"></i>
            </button>
        </div>
    </header>

    <main class="contenedor-busqueda">
        
        <section class="seccion-buscador-central">
            <h1 class="titulo-neon">CONECTA CON <span class="resaltado">PROGRAMADORES</span></h1>
            <div class="caja-busqueda-neon">
                <input type="text" placeholder="Busca por nombre, lenguaje o tecnología...">
                <button class="btn-buscar-neon">
                    <i class="fas fa-terminal"></i> BUSCAR
                </button>
            </div>
        </section>

        <section class="seccion-carrusel">
            <h2 class="subtitulo-neon">Perfiles Destacados</h2>
            <div class="carrusel-contenedor">
                <div class="tarjeta-perfil-neon">
                    <div class="foto-perfil-dummy"></div>
                    <h3>David Alcázar</h3>
                    <p>Full Stack Developer</p>
                    <div class="tags">
                        <span>Java</span><span>Python</span>
                    </div>
                    <button class="btn-perfil">Ver Perfil</button>
                </div>
                <div class="tarjeta-perfil-neon activo">
                    <div class="foto-perfil-dummy"></div>
                    <h3>Cristian Escobar</h3>
                    <p>UI/UX Designer & Dev</p>
                    <div class="tags">
                        <span>Figma</span><span>CSS3</span>
                    </div>
                    <button class="btn-perfil">Ver Perfil</button>
                </div>
                <div class="tarjeta-perfil-neon">
                    <div class="foto-perfil-dummy"></div>
                    <h3>Sergio Ajo</h3>
                    <p>Backend Engineer</p>
                    <div class="tags">
                        <span>Node.js</span><span>SQL</span>
                    </div>
                    <button class="btn-perfil">Ver Perfil</button>
                </div>
            </div>
        </section>

    </main>

    <footer class="footer-principal">
        <div class="footer-contenido">
            <div class="footer-seccion">
                <img src="../../Img/logo_sin_silla_de_ruedas-removebg-preview.png" alt="Logotipo" class="footer-logo">
                <div class="footer-texto">
                    <p>2026 ProGrammer</p>
                    <p>Sergio Ajo, Cristian Escobar, David Alcázar</p>
                </div>
            </div>
            <div class="footer-seccion footer-links">
                <a href="#">Sobre nosotros</a>
                <a href="#">Privacidad</a>
                <a href="#">Términos</a>
                <a href="#">Contacto</a>
            </div>
            <div class="footer-seccion footer-redes">
                <a href="#"><i class="fab fa-github"></i></a>
                <a href="#"><i class="fab fa-linkedin"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
            </div>
        </div>
    </footer>

</body>
</html>
