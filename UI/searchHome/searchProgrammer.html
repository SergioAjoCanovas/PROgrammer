<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProGrammer - Buscar Perfiles</title>
    <link rel="stylesheet" href="../../Style/general_styles/header.css">
    <link rel="stylesheet" href="../../Style/general_styles/footer.css">
    <link rel="stylesheet" href="../../Style/general_styles/general_styles.css">
    <link rel="stylesheet" href="../../Style/homePage_styles/searchProgrammer.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="header-placeholder"></div>

    <main class="contenedor-busqueda">
        
        <section class="seccion-buscador-central">
            <h1 class="titulo-neon">CONECTA CON <span class="resaltado">PROGRAMADORES</span></h1>
            <div class="caja-busqueda-neon">
                <input type="text" placeholder="Busca por nombre, lenguaje o tecnología...">
                <button class="btn-buscar-neon">
                    <i class="fas fa-terminal"></i> BUSCAR
                </button>
            </div>
        </section>

        <section class="seccion-carrusel">
            <h2 class="subtitulo-neon">Perfiles Destacados</h2>
            <div class="carrusel-contenedor">
                <div class="tarjeta-perfil-neon">
                    <div class="foto-perfil-dummy"></div>
                    <h3>David Alcázar</h3>
                    <p>Full Stack Developer</p>
                    <div class="tags">
                        <span>Java</span><span>Python</span>
                    </div>
                    <button class="btn-perfil">Ver Perfil</button>
                </div>
                <div class="tarjeta-perfil-neon activo">
                    <div class="foto-perfil-dummy"></div>
                    <h3>Cristian Escobar</h3>
                    <p>UI/UX Designer & Dev</p>
                    <div class="tags">
                        <span>Figma</span><span>CSS3</span>
                    </div>
                    <button class="btn-perfil">Ver Perfil</button>
                </div>
                <div class="tarjeta-perfil-neon">
                    <div class="foto-perfil-dummy"></div>
                    <h3>Sergio Ajo</h3>
                    <p>Backend Engineer</p>
                    <div class="tags">
                        <span>Node.js</span><span>SQL</span>
                    </div>
                    <button class="btn-perfil">Ver Perfil</button>
                </div>
            </div>
        </section>

    </main>

    <div id="footer-placeholder"></div>

    <!-- JS para cargar header y footer -->
<script>
    // Ajusta las rutas según la ubicación del HTML
    const headerPath = "../../includes/header.html";
    const footerPath = "../../includes/footer.html";

    fetch(headerPath)
        .then(res => res.text())
        .then(html => document.getElementById("header-placeholder").innerHTML = html);

    fetch(footerPath)
        .then(res => res.text())
        .then(html => document.getElementById("footer-placeholder").innerHTML = html);
</script>
</body>
</html>
