<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProGrammer - Buscar Empresas</title>
    <link rel="stylesheet" href="../../Style/general_styles/header.css">
    <link rel="stylesheet" href="../../Style/general_styles/footer.css">
    <link rel="stylesheet" href="../../Style/general_styles/general_styles.css">
    <link rel="stylesheet" href="../../Style/homePage_styles/searchCompanies.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="body-layout">

    <div id="header-placeholder"></div>

    <main class="contenedor-busqueda">
        
        <section class="seccion-buscador-central">
            <h1 class="titulo-neon">CONECTA CON <span class="resaltado">EMPRESAS</span></h1>
            <div class="caja-busqueda-neon">
                <input type="text" placeholder="Busca por sector, tecnología o nombre de empresa...">
                <button class="btn-buscar-neon">
                    <i class="fas fa-search"></i> BUSCAR
                </button>
            </div>
        </section>

        <section class="seccion-carrusel">
            <h2 class="subtitulo-neon">Empresas Destacadas</h2>
            <div class="carrusel-contenedor">
                
                <div class="tarjeta-perfil-neon">
                    <div class="foto-perfil-dummy"><i class="fas fa-microchip"></i></div>
                    <h3>TechNova</h3>
                    <p>Desarrollo de Software</p>
                    <div class="tags">
                        <span>AI</span><span>Cloud</span>
                    </div>
                    <button class="btn-perfil">Ver Vacantes</button>
                </div>

                <div class="tarjeta-perfil-neon activo">
                    <div class="foto-perfil-dummy"><i class="fas fa-rocket"></i></div>
                    <h3>Galaxy Systems</h3>
                    <p>Ciberseguridad & Redes</p>
                    <div class="tags">
                        <span>Security</span><span>NASA</span>
                    </div>
                    <button class="btn-perfil">Ver Vacantes</button>
                </div>

                <div class="tarjeta-perfil-neon">
                    <div class="foto-perfil-dummy"><i class="fas fa-laptop-code"></i></div>
                    <h3>DevCore Inc.</h3>
                    <p>Consultoría Tecnológica</p>
                    <div class="tags">
                        <span>Java</span><span>Kotlin</span>
                    </div>
                    <button class="btn-perfil">Ver Vacantes</button>
                </div>

            </div>
        </section>

    </main>

    <div id="footer-placeholder"></div>

    <script>
        const headerPath = "../../includes/header.html";
        const footerPath = "../../includes/footer.html";

        fetch(headerPath)
            .then(res => res.text())
            .then(html => document.getElementById("header-placeholder").innerHTML = html);

        fetch(footerPath)
            .then(res => res.text())
            .then(html => document.getElementById("footer-placeholder").innerHTML = html);
    </script>

</body>
</html>
