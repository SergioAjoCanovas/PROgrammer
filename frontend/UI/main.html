<body class="fondo-oscuro-neon"><!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProGrammer - Conecta</title>
    <link rel="stylesheet" href="/frontend/Style/general_styles/header.css">
    <link rel="stylesheet" href="/frontend/Style/general_styles/footer.css">
    <link rel="stylesheet" href="/frontend/Style/general_styles/general_styles.css">
    <link rel="stylesheet" href="/frontend/Style/homePage_styles/selector.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="fondo-oscuro-neon">

    <div id="header-placeholder"></div>

    <main class="contenedor-selector">
        <section class="contenido-central">
            <h1 class="titulo-selector">CONECTA CON:</h1>
            
            <div class="contenedor-botones-gigantes">
                <a href="/frontend/UI/searchHome/serachCompanies.html" class="btn-seleccion-neon">
                    <i class="fas fa-building"></i>
                    <span>EMPRESAS</span>
                </a>

                <a href="/frontend/UI/searchHome/searchProgrammer.html" class="btn-seleccion-neon">
                    <i class="fas fa-code"></i>
                    <span>PROGRAMADORES</span>
                </a>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        function cargarComponentes() {
            const headerPath = "/frontend/includes/header.html";
            const footerPath = "/frontend/includes/footer.html";

            // Cargar Header y resaltar
            fetch(headerPath)
                .then(res => res.text())
                .then(html => {
                    document.getElementById("header-placeholder").innerHTML = html;
                    marcarLinkActivo(); 
                });

            // Cargar Footer
            fetch(footerPath)
                .then(res => res.text())
                .then(html => {
                    document.getElementById("footer-placeholder").innerHTML = html;
                });
        }

        function marcarLinkActivo() {
            const currentPath = window.location.pathname;
            const enlaces = document.querySelectorAll('#header-placeholder a');

            enlaces.forEach(enlace => {
                const href = enlace.getAttribute('href');
                // Si el href del enlace coincide con la ruta actual de la web
                if (href && currentPath.includes(href)) {
                    enlace.classList.add('activo');
                }
            });
        }

        // Ejecutar al cargar la ventana
        window.onload = cargarComponentes;
    </script>

</body>
</html>
