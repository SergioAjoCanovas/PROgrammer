<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="/frontend/Style/general_styles/footer.css">
    <link rel="stylesheet" href="/frontend/Style/loginPage_styles/loginPage.css">
    <link rel="stylesheet" href="/frontend/Style/signUpPage_styles/signUpPage.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <title>Registro - PROgrammer</title>
</head>
<body>
    <main class="contenedor-login">
        <div class="login-card tarjeta-acordeon">
            <img src="/frontend/Img/logo_sin_silla_de_ruedas-removebg-preview.png" alt="Logotipo PROgrammer" class="login-logo"/>
            
            <h2>Crear cuenta</h2>
            
            <form action="#" method="POST" class="login-form">
                
                <div class="input-group">
                    <label for="username">Nombre de usuario</label>
                    <input type="text" id="username" name="username" placeholder="Ej: Jonh Doe" required/>
                </div>

                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" placeholder="jochdoe@email.com" required/>
                </div>

                <div class="input-group">
                    <label for="id_rol">¿Qué tipo de perfil buscas?</label>
                    <div class="select-wrapper">
                        <select id="id_rol" name="id_rol" required>
                            <option value="" disabled selected>Selecciona tu perfil...</option>
                            <option value="1">Usuario normal (Solo quiero explorar)</option>
                            <option value="2">Desarrollador (Busco proyectos/empleo)</option>
                            <option value="3">Empresa (Busco talento)</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="Crea una contraseña segura" required>
                        <i class="far fa-eye toggle-password" data-target="password"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label for="confirm_password">Repetir Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirm_password" name="confirm_password" placeholder="Vuelve a escribirla" required>
                        <i class="far fa-eye toggle-password" data-target="confirm_password"></i>
                    </div>
                </div>

                <button type="submit" class="boton-ver" style="margin-top: 10px;">Registrarme</button>
                
                <div class="registro-link">
                    <p>¿Ya tienes cuenta? <a href="/frontend/UI/loginPage/loginPage.html">Inicia sesión aquí</a></p>
                </div>

            </form>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        const togglePasswords = document.querySelectorAll('.toggle-password');

        togglePasswords.forEach(function(icon) {
            icon.addEventListener('click', function() {
                const targetId = this.getAttribute('data-target');
                const passwordInput = document.getElementById(targetId);

                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                
                this.classList.toggle('fa-eye-slash');
                this.classList.toggle('fa-eye');
            });
        });
    </script>

    <!-- JS para cargar header y footer -->
<script>
    // Ajusta las rutas según la ubicación del HTML
    const headerPath = "/frontend/includes/header.html";
    const footerPath = "/frontend/includes/footer.html";

    fetch(headerPath)
        .then(res => res.text())
        .then(html => document.getElementById("header-placeholder").innerHTML = html);

    fetch(footerPath)
        .then(res => res.text())
        .then(html => document.getElementById("footer-placeholder").innerHTML = html);
</script>

</body>
</html>
